<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UI用語集ギャラリー</title>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/demos.css">
  <link rel="stylesheet" href="css/search.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <h1 class="sidebar-title">UI用語集</h1>
        <p class="sidebar-subtitle">Interactive Glossary</p>
      </div>
      <div class="search-container">
        <input type="text" id="search-input" class="search-input" placeholder="用語を検索..." autocomplete="off">
        <span class="search-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        </span>
        <button id="search-clear" class="search-clear" hidden>&times;</button>
      </div>
      <nav id="sidebar-nav" class="sidebar-nav"></nav>
      <div class="sidebar-footer">
        <button id="theme-toggle" class="theme-toggle" aria-label="テーマ切り替え">
          <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
          <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
        <span class="term-count" id="term-count"></span>
      </div>
    </aside>

    <div id="sidebar-overlay" class="sidebar-overlay"></div>

    <main id="main-content" class="main-content">
      <header class="main-header">
        <button id="menu-toggle" class="menu-toggle" aria-label="メニュー">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
        </button>
        <div class="header-info">
          <h2 id="current-section" class="current-section"></h2>
        </div>
        <div class="header-actions">
          <button id="view-toggle" class="view-toggle" aria-label="表示切替">
            <svg class="icon-grid" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
            <svg class="icon-list" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>
          </button>
        </div>
      </header>

      <div id="search-results-info" class="search-results-info" hidden></div>

      <div id="glossary-content" class="glossary-content"></div>

      <button id="back-to-top" class="back-to-top" aria-label="上に戻る" hidden>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m18 15-6-6-6 6"/></svg>
      </button>
    </main>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
